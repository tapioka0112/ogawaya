    <script>
      (function () {
        function boot() {
          try {
            if (!window.OgawayaLiff || typeof window.OgawayaLiff.createController !== 'function') {
              var bootErrorBox = document.getElementById('error-message');
              if (bootErrorBox) {
                bootErrorBox.textContent = '初期化スクリプトの読み込みに失敗しました。画面を再読み込みしてください。';
                bootErrorBox.dataset.visible = 'true';
              }
              if (window.google && window.google.script && window.google.script.run) {
                window.google.script.run.withFailureHandler(function () {}).logClientEvent({
                  name: 'boot.error',
                  mode: 'user',
                  details: { reason: 'OgawayaLiff missing' }
                });
              }
              return;
            }
            var controller = window.OgawayaLiff.createController({
              document: document,
              auth: window.OgawayaLiff.createAuth(),
              api: window.OgawayaLiff.createApi(window.OGAWAYA_APP_BASE_URL),
              mode: 'user',
              appBaseUrl: window.OGAWAYA_APP_BASE_URL
            });
            controller.init();
          } catch (error) {
            var errorBox = document.getElementById('error-message');
            if (errorBox) {
              errorBox.textContent = error && error.message ? error.message : 'LIFF の初期化に失敗しました';
              errorBox.dataset.visible = 'true';
            }
            if (window.google && window.google.script && window.google.script.run) {
              window.google.script.run.withFailureHandler(function () {}).logClientEvent({
                name: 'boot.exception',
                mode: 'user',
                details: { message: error && error.message ? String(error.message) : '' }
              });
            }
          }
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', boot, { once: true });
          return;
        }
        boot();
      })();
    </script>
