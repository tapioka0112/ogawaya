<script>
  (function (global) {
    function normalizeBaseUrl(baseUrl) {
      return String(baseUrl || '').replace(/\/+$/, '');
    }

    function appendQuery(url, query) {
      var pairs = [];
      Object.keys(query || {}).forEach(function (key) {
        var value = query[key];
        if (value === '' || value == null) {
          return;
        }
        pairs.push(encodeURIComponent(key) + '=' + encodeURIComponent(String(value)));
      });
      if (pairs.length === 0) {
        return url;
      }
      return url + (url.indexOf('?') === -1 ? '?' : '&') + pairs.join('&');
    }

    function createApi(baseUrl) {
      var normalizedBaseUrl = normalizeBaseUrl(baseUrl);

      function canUseGoogleScriptRunner() {
        return !!(
          global.google &&
          global.google.script &&
          global.google.script.run &&
          typeof global.google.script.run.withSuccessHandler === 'function' &&
          typeof global.google.script.run.withFailureHandler === 'function'
        );
      }

      function toError(value) {
        if (value instanceof Error) {
          return value;
        }
        if (value && typeof value.message === 'string') {
          return new Error(value.message);
        }
        return new Error(String(value || 'API request failed'));
      }

      function ensureSuccessPayload(payload, fallbackStatusCode) {
        var statusCode = payload && typeof payload.statusCode === 'number'
          ? payload.statusCode
          : Number(payload && payload.statusCode) || fallbackStatusCode || 500;
        if (!payload || payload.ok === false || statusCode >= 400) {
          var error = new Error((payload && payload.message) || 'API request failed');
          error.code = (payload && payload.code) || '';
          error.statusCode = statusCode;
          throw error;
        }
        return payload;
      }

      function requestViaGoogleScriptRunner(requestPayload) {
        return new Promise(function (resolve, reject) {
          try {
            global.google.script.run
              .withSuccessHandler(function (payload) {
                resolve(payload);
              })
              .withFailureHandler(function (error) {
                reject(toError(error));
              })
              .handleClientApi(requestPayload);
          } catch (error) {
            reject(toError(error));
          }
        });
      }

      async function request(method, path, idToken, body, query) {
        var queryParams = {};
        var requestBody = body || {};

        if (idToken) {
          queryParams.idToken = idToken;
        }
        Object.keys(query || {}).forEach(function (key) {
          queryParams[key] = query[key];
        });

        if (canUseGoogleScriptRunner()) {
          var bridgePayload = await requestViaGoogleScriptRunner({
            method: method,
            path: path,
            query: queryParams,
            body: requestBody
          });
          return ensureSuccessPayload(bridgePayload, 200);
        }

        var actualMethod = method;
        var url = normalizedBaseUrl + path;
        var options = {
          method: method
        };
        if (method === 'PUT' || method === 'DELETE') {
          actualMethod = 'POST';
          queryParams._method = method;
        }
        url = appendQuery(url, queryParams);
        options.method = actualMethod;
        if (actualMethod !== 'GET') {
          options.body = JSON.stringify(requestBody);
        }
        var response = await global.fetch(url, options);
        var payload = await response.json();
        return ensureSuccessPayload(payload, response.status);
      }

      return {
        getMe: function (idToken) {
          return request('GET', '/api/me', idToken);
        },
        linkAccount: function (idToken, body) {
          return request('POST', '/api/link', idToken, body);
        },
        getTodayChecklist: function (idToken) {
          return request('GET', '/api/checklists/today', idToken);
        },
        getTodayIncomplete: function (idToken) {
          return request('GET', '/api/checklists/today/incomplete', idToken);
        },
        checkItem: function (idToken, runItemId, body) {
          return request('POST', '/api/checklist-items/' + encodeURIComponent(runItemId) + '/check', idToken, body);
        },
        uncheckItem: function (idToken, runItemId, body) {
          return request('POST', '/api/checklist-items/' + encodeURIComponent(runItemId) + '/uncheck', idToken, body);
        },
        listTemplates: function (idToken) {
          return request('GET', '/api/admin/templates', idToken);
        },
        createTemplate: function (idToken, body) {
          return request('POST', '/api/admin/templates', idToken, body);
        },
        updateTemplate: function (idToken, templateId, body) {
          return request('PUT', '/api/admin/templates/' + encodeURIComponent(templateId), idToken, body);
        },
        createTemplateItem: function (idToken, templateId, body) {
          return request('POST', '/api/admin/templates/' + encodeURIComponent(templateId) + '/items', idToken, body);
        },
        updateTemplateItem: function (idToken, templateId, itemId, body) {
          return request(
            'PUT',
            '/api/admin/templates/' + encodeURIComponent(templateId) + '/items/' + encodeURIComponent(itemId),
            idToken,
            body
          );
        },
        deleteTemplateItem: function (idToken, templateId, itemId) {
          return request(
            'DELETE',
            '/api/admin/templates/' + encodeURIComponent(templateId) + '/items/' + encodeURIComponent(itemId),
            idToken,
            {}
          );
        },
        notifyIncomplete: function (idToken, runId) {
          return request('POST', '/api/admin/checklists/' + encodeURIComponent(runId) + '/notify-incomplete', idToken, {});
        }
      };
    }

    function createAuth() {
      function extractLiffId(value) {
        var rawValue = String(value || '').replace(/\s+/g, '');
        if (!rawValue) {
          return '';
        }
        if (/^[0-9]{10}-[A-Za-z0-9]+$/.test(rawValue)) {
          return rawValue;
        }
        var extracted = rawValue.match(/(?:https?:\/\/liff\.line\.me\/|line:\/\/app\/)?([0-9]{10}-[A-Za-z0-9]+)/);
        if (extracted && extracted[1]) {
          return extracted[1];
        }
        return '';
      }

      function getNormalizedLiffId() {
        return extractLiffId(global.OGAWAYA_LIFF_ID || '');
      }

      function buildAnonymousContext() {
        return {
          idToken: '',
          context: {
            isInClient: false,
            isLoggedIn: false,
            os: '',
            lineVersion: '',
            language: '',
            isAnonymous: true
          }
        };
      }

      function buildAuthenticatedContext(idToken, runtimeContext) {
        return {
          idToken: idToken,
          context: {
            isInClient: !!(runtimeContext && runtimeContext.isInClient),
            isLoggedIn: !!(runtimeContext && runtimeContext.isLoggedIn),
            os: runtimeContext && runtimeContext.os ? runtimeContext.os : '',
            lineVersion: runtimeContext && runtimeContext.lineVersion ? runtimeContext.lineVersion : '',
            language: runtimeContext && runtimeContext.language ? runtimeContext.language : '',
            isAnonymous: false
          }
        };
      }

      function buildRuntimeContext() {
        var liffRef = global.liff;
        var inClient = typeof liffRef.isInClient === 'function'
          ? !!liffRef.isInClient()
          : false;
        var loggedIn = typeof liffRef.isLoggedIn === 'function'
          ? !!liffRef.isLoggedIn()
          : false;
        var os = typeof liffRef.getOS === 'function'
          ? String(liffRef.getOS() || '')
          : '';
        var lineVersion = typeof liffRef.getLineVersion === 'function'
          ? String(liffRef.getLineVersion() || '')
          : '';
        var language = typeof liffRef.getLanguage === 'function'
          ? String(liffRef.getLanguage() || '')
          : '';
        return {
          isInClient: inClient,
          isLoggedIn: loggedIn,
          os: os,
          lineVersion: lineVersion,
          language: language
        };
      }

      function getLiffInitTimeoutMs() {
        var configured = Number(global.OGAWAYA_LIFF_INIT_TIMEOUT_MS);
        if (configured > 0) {
          return configured;
        }
        return 3000;
      }

      function initLiffWithTimeout(liffId) {
        var initPromise = global.liff.init({
          liffId: liffId,
          withLoginOnExternalBrowser: true
        });
        if (!initPromise || typeof initPromise.then !== 'function') {
          return Promise.resolve(initPromise);
        }
        if (typeof global.setTimeout !== 'function' || typeof global.clearTimeout !== 'function') {
          return initPromise;
        }
        var timeoutMs = getLiffInitTimeoutMs();
        return new Promise(function (resolve, reject) {
          var settled = false;
          var timer = global.setTimeout(function () {
            if (settled) {
              return;
            }
            settled = true;
            var timeoutError = new Error('LIFF SDK 初期化がタイムアウトしました');
            timeoutError.code = 'liff_init_timeout';
            reject(timeoutError);
          }, timeoutMs);

          initPromise.then(function (value) {
            if (settled) {
              return;
            }
            settled = true;
            global.clearTimeout(timer);
            resolve(value);
          }).catch(function (error) {
            if (settled) {
              return;
            }
            settled = true;
            global.clearTimeout(timer);
            reject(error);
          });
        });
      }

      return {
        initialize: async function () {
          var normalizedLiffId = getNormalizedLiffId();
          if (global.__OGAWAYA_MOCK__ && global.__OGAWAYA_MOCK__.idToken) {
            return buildAuthenticatedContext(global.__OGAWAYA_MOCK__.idToken, {
              isInClient: true,
              isLoggedIn: true,
              os: '',
              lineVersion: '',
              language: ''
            });
          }

          if (global.OGAWAYA_ALLOW_ANONYMOUS_ACCESS === true) {
            if (global.OGAWAYA_TRY_LIFF_AUTH_IN_ANONYMOUS !== true) {
              return buildAnonymousContext();
            }
            if (!global.liff || !normalizedLiffId || typeof global.liff.init !== 'function') {
              return buildAnonymousContext();
            }
            try {
              await initLiffWithTimeout(normalizedLiffId);
            } catch (error) {
              return buildAnonymousContext();
            }
            var anonymousPostContext = buildRuntimeContext();
            var anonymousIdToken = typeof global.liff.getIDToken === 'function'
              ? global.liff.getIDToken()
              : '';
            if (!anonymousIdToken) {
              return buildAnonymousContext();
            }
            return buildAuthenticatedContext(anonymousIdToken, anonymousPostContext);
          }

          if (!global.liff) {
            throw new Error('LIFF SDK が読み込まれていません');
          }
          if (!normalizedLiffId) {
            throw new Error('LIFF ID が未設定です');
          }

          await initLiffWithTimeout(normalizedLiffId);
          var postContext = buildRuntimeContext();
          if (typeof global.liff.isLoggedIn === 'function' && !global.liff.isLoggedIn()) {
            if (typeof global.liff.login === 'function') {
              global.liff.login();
            }
            throw new Error('LINE ログイン画面へ遷移しました。ログイン後に再度開いてください。');
          }
          var idToken = global.liff.getIDToken();
          if (!idToken) {
            throw new Error('LIFF 認証コンテキストを取得できません');
          }
          return buildAuthenticatedContext(idToken, postContext);
        },
        getNormalizedLiffIdForDebug: getNormalizedLiffId
      };
    }

    function createController(options) {
      var state = {
        idToken: '',
        me: null,
        checklist: null,
        incomplete: null,
        templates: [],
        selectedTemplateId: '',
        selectedTemplateItemId: ''
      };
      var pendingItemActions = {};
      var documentRef = options.document;
      var auth = options.auth;
      var api = options.api;
      var mode = options.mode;
      var appBaseUrl = normalizeBaseUrl(options.appBaseUrl || global.OGAWAYA_APP_BASE_URL || '');
      var elements = {
        errorBox: documentRef.getElementById('error-message'),
        statusBox: documentRef.getElementById('status-message'),
        storeName: documentRef.getElementById('store-name'),
        targetDate: documentRef.getElementById('target-date'),
        progressSummary: documentRef.getElementById('progress-summary'),
        checklistItems: documentRef.getElementById('checklist-items'),
        mainContent: documentRef.getElementById('main-content'),
        linkPanel: documentRef.getElementById('link-panel'),
        linkEmployeeCodeInput: documentRef.getElementById('link-employee-code-input'),
        linkPasscodeInput: documentRef.getElementById('link-passcode-input'),
        linkAccountButton: documentRef.getElementById('link-account-button'),
        refreshButton: documentRef.getElementById('refresh-button'),
        screenMode: documentRef.getElementById('screen-mode'),
        incompleteSummary: documentRef.getElementById('incomplete-summary'),
        incompleteItems: documentRef.getElementById('incomplete-items'),
        notifyButton: documentRef.getElementById('notify-button'),
        templateSelect: documentRef.getElementById('template-select'),
        templateNameInput: documentRef.getElementById('template-name-input'),
        updateTemplateButton: documentRef.getElementById('update-template-button'),
        newTemplateNameInput: documentRef.getElementById('new-template-name-input'),
        createTemplateButton: documentRef.getElementById('create-template-button'),
        templateItems: documentRef.getElementById('template-items'),
        templateItemSelect: documentRef.getElementById('template-item-select'),
        templateItemTitleInput: documentRef.getElementById('template-item-title-input'),
        templateItemDescriptionInput: documentRef.getElementById('template-item-description-input'),
        templateItemSortOrderInput: documentRef.getElementById('template-item-sort-order-input'),
        templateItemRequiredInput: documentRef.getElementById('template-item-required-input'),
        updateTemplateItemButton: documentRef.getElementById('update-template-item-button'),
        deleteTemplateItemButton: documentRef.getElementById('delete-template-item-button'),
        newItemTitleInput: documentRef.getElementById('new-item-title-input'),
        newItemDescriptionInput: documentRef.getElementById('new-item-description-input'),
        newItemSortOrderInput: documentRef.getElementById('new-item-sort-order-input'),
        newItemRequiredInput: documentRef.getElementById('new-item-required-input'),
        addTemplateItemButton: documentRef.getElementById('add-template-item-button')
      };

      function normalizeArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function canManageTemplates() {
        return false;
      }

      function isUnlinkedUserError(error) {
        return !!(error && String(error.message || '').indexOf('LINE 連携済みユーザーではありません') !== -1);
      }

      function emitClientEvent(name, details) {
        var payload = {
          name: String(name || ''),
          mode: mode,
          details: details || {}
        };

        function sendViaHttp() {
          if (!appBaseUrl || !global.fetch) {
            return false;
          }
          var query = {
            name: payload.name,
            mode: payload.mode,
            message: payload.details && payload.details.message ? String(payload.details.message) : '',
            code: payload.details && payload.details.code ? String(payload.details.code) : '',
            statusCode: payload.details && payload.details.statusCode ? String(payload.details.statusCode) : ''
          };
          var url = appendQuery(appBaseUrl + '/api/client-events', query);
          global.fetch(url, {
            method: 'GET',
            mode: 'no-cors',
            keepalive: true
          }).catch(function () {});
          return true;
        }

        // google.script.run のキュー詰まりを避けるため、まず HTTP で送る。
        sendViaHttp();
        if (!global.google || !global.google.script || !global.google.script.run) {
          return;
        }
        try {
          global.google.script.run
            .withFailureHandler(function () {
              sendViaHttp();
            })
            .logClientEvent(payload);
        } catch (error) {
          // クライアントログ送信は本処理を阻害しない
          sendViaHttp();
        }
      }

      function isUnauthorizedError(error) {
        if (!error) {
          return false;
        }
        return error.statusCode === 401 || error.code === 'unauthorized';
      }

      function setLinkMode(enabled) {
        var hasLinkPanel = !!elements.linkPanel;
        if (elements.linkPanel) {
          elements.linkPanel.hidden = !enabled;
        }
        if (elements.mainContent) {
          elements.mainContent.hidden = hasLinkPanel && !!enabled;
        }
      }

      function setBoxMessage(element, message) {
        if (!element) {
          return;
        }
        element.textContent = message || '';
        element.dataset.visible = message ? 'true' : 'false';
      }

      function setText(element, value) {
        if (!element) {
          return;
        }
        element.textContent = value == null ? '' : String(value);
      }

      function clearList(element) {
        if (!element) {
          return;
        }
        element.innerHTML = '';
      }

      function setError(message) {
        setBoxMessage(elements.errorBox, message);
      }

      function clearError() {
        setError('');
      }

      function setStatus(message) {
        setBoxMessage(elements.statusBox, message);
      }

      function clearStatus() {
        setStatus('');
      }

      function clearOverview() {
        setText(elements.storeName, '-');
        setText(elements.targetDate, '-');
        setText(elements.progressSummary, '-');
      }

      function createMessageListItem(text, className) {
        var item = documentRef.createElement('li');
        item.className = className;
        item.textContent = text;
        return item;
      }

      function createActionButton(label, action, itemId, handler, className) {
        var button = documentRef.createElement('button');
        button.type = 'button';
        button.className = className || 'action-button';
        button.dataset.action = action;
        button.dataset.runItemId = itemId;
        button.textContent = label;
        button.addEventListener('click', handler);
        return button;
      }

      function formatCheckedAtJst(value) {
        if (!value) {
          return '';
        }
        var date = new Date(value);
        if (isNaN(date.getTime())) {
          return String(value);
        }
        if (typeof Intl === 'undefined' || typeof Intl.DateTimeFormat !== 'function') {
          var jstDate = new Date(date.getTime() + (9 * 60 * 60 * 1000));
          var fallbackMinute = jstDate.getUTCMinutes();
          return (
            (jstDate.getUTCMonth() + 1) +
            '月' +
            jstDate.getUTCDate() +
            '日' +
            jstDate.getUTCHours() +
            '時' +
            (fallbackMinute < 10 ? '0' + fallbackMinute : String(fallbackMinute)) +
            '分'
          );
        }
        var formatter = new Intl.DateTimeFormat('ja-JP', {
          timeZone: 'Asia/Tokyo',
          month: 'numeric',
          day: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: false
        });
        var values = {};
        formatter.formatToParts(date).forEach(function (part) {
          values[part.type] = part.value;
        });
        if (!values.month || !values.day || !values.hour || !values.minute) {
          return String(value);
        }
        return values.month + '月' + values.day + '日' + values.hour + '時' + values.minute + '分';
      }

      function renderRole() {}

      function applyCurrentUser(currentUser) {
        if (!currentUser) {
          return;
        }
        state.me = currentUser;
        renderRole(state.me.role);
      }

      function renderOverview(checklist) {
        state.checklist = checklist;
        setText(elements.storeName, checklist.storeName || (state.me && state.me.store && state.me.store.name) || '-');
        setText(elements.targetDate, checklist.targetDate || '-');
        if (checklist.progress) {
          setText(elements.progressSummary, checklist.progress.checked + ' / ' + checklist.progress.total);
        }
      }

      function rerenderRoleDependentSections() {
        if (state.checklist) {
          renderOverview(state.checklist);
          renderChecklist(state.checklist);
        }
        if (state.incomplete) {
          renderIncomplete(state.incomplete);
        }
      }

      function canUncheck(item) {
        if (item.status !== 'checked') {
          return false;
        }
        return true;
      }

      function findChecklistItemById(runItemId) {
        if (!state.checklist || !Array.isArray(state.checklist.items)) {
          return null;
        }
        return state.checklist.items.find(function (item) {
          return item.id === runItemId;
        }) || null;
      }

      function recomputeProgress() {
        if (!state.checklist || !Array.isArray(state.checklist.items)) {
          return;
        }
        var checkedCount = state.checklist.items.filter(function (item) {
          return item.status === 'checked';
        }).length;
        state.checklist.progress = {
          total: state.checklist.items.length,
          checked: checkedCount
        };
      }

      function upsertIncompleteItemFromChecklistItem(item) {
        if (!state.incomplete) {
          return;
        }
        var incompleteItems = normalizeArray(state.incomplete.items).filter(function (incompleteItem) {
          return incompleteItem.id !== item.id;
        });
        if (item.status === 'unchecked') {
          incompleteItems.push({
            id: item.id,
            title: item.title
          });
        }
        state.incomplete.items = incompleteItems;
      }

      function applyChecklistItemUpdate(updatedItem) {
        if (!updatedItem || !state.checklist || !Array.isArray(state.checklist.items)) {
          return;
        }
        var target = findChecklistItemById(updatedItem.id);
        if (!target) {
          return;
        }
        target.status = updatedItem.status;
        target.checkedBy = updatedItem.checkedBy;
        target.checkedByUserId = updatedItem.checkedByUserId;
        target.checkedAt = updatedItem.checkedAt;
        recomputeProgress();
        upsertIncompleteItemFromChecklistItem(target);
        renderOverview(state.checklist);
        renderChecklist(state.checklist);
        if (state.incomplete) {
          renderIncomplete(state.incomplete);
        }
      }

      function buildOptimisticCheckedItem(item) {
        var nowIso = new Date().toISOString();
        return {
          id: item.id,
          title: item.title,
          status: 'checked',
          checkedBy: state.me && state.me.name ? state.me.name : '自分',
          checkedByUserId: state.me && state.me.userId ? state.me.userId : '',
          checkedAt: nowIso
        };
      }

      function buildOptimisticUncheckedItem(item) {
        return {
          id: item.id,
          title: item.title,
          status: 'unchecked',
          checkedBy: null,
          checkedByUserId: null,
          checkedAt: null
        };
      }

      function loadAncillaryInBackground() {
        if (!state.checklist || !state.checklist.runId) {
          return;
        }
        if (canManageTemplates()) {
          loadTemplates().catch(function (error) {
            setError(error && error.message ? String(error.message) : 'テンプレートの取得に失敗しました');
          });
        }
      }

      function withPendingItemAction(runItemId, action) {
        if (pendingItemActions[runItemId]) {
          return;
        }
        pendingItemActions[runItemId] = true;
        renderChecklist(state.checklist || { items: [] });
        action().finally(function () {
          delete pendingItemActions[runItemId];
          renderChecklist(state.checklist || { items: [] });
        });
      }

      function ensureWritableSession() {
        if (state.idToken) {
          return true;
        }
        setError('LINE認証が完了していないため更新できません。LINEから開き直してください。');
        return false;
      }

      function handleCheck(runItemId) {
        if (!ensureWritableSession()) {
          return;
        }
        var currentItem = findChecklistItemById(runItemId);
        if (!currentItem || currentItem.status === 'checked') {
          return;
        }
        var rollbackItem = {
          id: currentItem.id,
          title: currentItem.title,
          status: currentItem.status,
          checkedBy: currentItem.checkedBy,
          checkedByUserId: currentItem.checkedByUserId,
          checkedAt: currentItem.checkedAt
        };
        applyChecklistItemUpdate(buildOptimisticCheckedItem(currentItem));
        setStatus('チェックを更新しました');
        withPendingItemAction(runItemId, function () {
          return api.checkItem(state.idToken, runItemId, { comment: '' }).then(function (response) {
            if (response && response.item) {
              applyChecklistItemUpdate(response.item);
            }
          }).catch(function (error) {
            applyChecklistItemUpdate(rollbackItem);
            setError(error && error.message ? String(error.message) : 'チェック更新に失敗しました');
          });
        });
      }

      function handleUncheck(runItemId) {
        if (!ensureWritableSession()) {
          return;
        }
        var currentItem = findChecklistItemById(runItemId);
        if (!currentItem || currentItem.status === 'unchecked') {
          return;
        }
        var rollbackItem = {
          id: currentItem.id,
          title: currentItem.title,
          status: currentItem.status,
          checkedBy: currentItem.checkedBy,
          checkedByUserId: currentItem.checkedByUserId,
          checkedAt: currentItem.checkedAt
        };
        applyChecklistItemUpdate(buildOptimisticUncheckedItem(currentItem));
        setStatus('チェックを取り消しました');
        withPendingItemAction(runItemId, function () {
          return api.uncheckItem(state.idToken, runItemId, { reason: '' }).then(function (response) {
            if (response && response.item) {
              applyChecklistItemUpdate(response.item);
            }
          }).catch(function (error) {
            applyChecklistItemUpdate(rollbackItem);
            setError(error && error.message ? String(error.message) : 'チェック取消に失敗しました');
          });
        });
      }

      function renderChecklist(checklist) {
        clearList(elements.checklistItems);
        normalizeArray(checklist.items).forEach(function (item) {
          var listItem = documentRef.createElement('li');
          listItem.className = 'checklist-item';

          var bullet = documentRef.createElement('span');
          bullet.className = 'check-bullet';
          bullet.dataset.status = item.status;

          var body = documentRef.createElement('div');
          body.className = 'item-body';

          var title = documentRef.createElement('div');
          title.className = 'item-title';
          title.textContent = item.title;

          var meta = documentRef.createElement('div');
          meta.className = 'item-meta';
          if (item.status === 'checked') {
            var checkedBy = item.checkedBy || 'LINEユーザー';
            var checkedAtText = formatCheckedAtJst(item.checkedAt);
            meta.textContent = checkedAtText ? checkedBy + ' / ' + checkedAtText : checkedBy;
          } else {
            meta.textContent = '未チェック';
          }

          var actions = documentRef.createElement('div');
          actions.className = 'button-row item-actions';
          if (item.status === 'unchecked' && api.checkItem) {
            var checkButton = createActionButton('チェックする', 'check', item.id, function () {
              clearError();
              clearStatus();
              handleCheck(item.id);
            });
            checkButton.disabled = !!pendingItemActions[item.id] || !state.idToken;
            actions.appendChild(checkButton);
          }
          if (canUncheck(item) && api.uncheckItem) {
            var uncheckButton = createActionButton('取消', 'uncheck', item.id, function () {
              clearError();
              clearStatus();
              handleUncheck(item.id);
            }, 'action-button ghost-button');
            uncheckButton.disabled = !!pendingItemActions[item.id] || !state.idToken;
            actions.appendChild(uncheckButton);
          }

          body.appendChild(title);
          body.appendChild(meta);
          if (actions.children.length > 0) {
            body.appendChild(actions);
          }
          listItem.appendChild(bullet);
          listItem.appendChild(body);
          elements.checklistItems.appendChild(listItem);
        });

        if (elements.checklistItems.children.length === 0) {
          elements.checklistItems.appendChild(createMessageListItem('当日の項目はありません。', 'empty-item'));
        }
      }

      function renderIncomplete(incomplete) {
        state.incomplete = incomplete;
        setText(elements.incompleteSummary, '未完了 ' + normalizeArray(incomplete.items).length + ' 件');
        clearList(elements.incompleteItems);

        normalizeArray(incomplete.items).forEach(function (item) {
          elements.incompleteItems.appendChild(createMessageListItem(item.title, 'plain-item'));
        });
        if (elements.incompleteItems.children.length === 0) {
          elements.incompleteItems.appendChild(createMessageListItem('未完了はありません。', 'empty-item'));
        }
        if (elements.notifyButton) {
          elements.notifyButton.disabled = !canManageTemplates() || normalizeArray(incomplete.items).length === 0;
        }
      }

      function clearSelect(element) {
        if (!element) {
          return;
        }
        element.innerHTML = '';
        element.value = '';
      }

      function appendSelectOptions(select, options, selectedValue) {
        if (!select) {
          return;
        }
        clearSelect(select);
        normalizeArray(options).forEach(function (option) {
          var element = documentRef.createElement('option');
          element.value = option.value;
          element.textContent = option.label;
          select.appendChild(element);
        });
        if (selectedValue) {
          select.value = selectedValue;
        }
      }

      function getSelectedTemplate() {
        var selectedTemplate = normalizeArray(state.templates).find(function (template) {
          return template.id === state.selectedTemplateId;
        });
        if (selectedTemplate) {
          return selectedTemplate;
        }
        return normalizeArray(state.templates)[0] || null;
      }

      function getSelectedTemplateItem() {
        var template = getSelectedTemplate();
        if (!template) {
          return null;
        }
        var selectedItem = normalizeArray(template.items).find(function (item) {
          return item.id === state.selectedTemplateItemId;
        });
        if (selectedItem) {
          return selectedItem;
        }
        return normalizeArray(template.items)[0] || null;
      }

      function resetTemplateItemEditor() {
        if (elements.templateItemTitleInput) {
          elements.templateItemTitleInput.value = '';
        }
        if (elements.templateItemDescriptionInput) {
          elements.templateItemDescriptionInput.value = '';
        }
        if (elements.templateItemSortOrderInput) {
          elements.templateItemSortOrderInput.value = '';
        }
        if (elements.templateItemRequiredInput) {
          elements.templateItemRequiredInput.checked = false;
        }
        if (elements.updateTemplateItemButton) {
          elements.updateTemplateItemButton.disabled = true;
        }
        if (elements.deleteTemplateItemButton) {
          elements.deleteTemplateItemButton.disabled = true;
        }
      }

      function renderTemplateItemEditor(template) {
        var items = template ? normalizeArray(template.items) : [];
        appendSelectOptions(elements.templateItemSelect, items.map(function (item) {
          return {
            value: item.id,
            label: item.title
          };
        }), state.selectedTemplateItemId);
        state.selectedTemplateItemId = elements.templateItemSelect && elements.templateItemSelect.value
          ? elements.templateItemSelect.value
          : '';

        var selectedItem = getSelectedTemplateItem();
        if (!selectedItem) {
          resetTemplateItemEditor();
          return;
        }

        elements.templateItemTitleInput.value = selectedItem.title;
        elements.templateItemDescriptionInput.value = selectedItem.description || '';
        elements.templateItemSortOrderInput.value = String(selectedItem.sortOrder);
        elements.templateItemRequiredInput.checked = !!selectedItem.isRequired;
        elements.updateTemplateItemButton.disabled = false;
        elements.deleteTemplateItemButton.disabled = false;
      }

      function renderTemplates() {
        if (!elements.templateSelect) {
          return;
        }

        appendSelectOptions(elements.templateSelect, normalizeArray(state.templates).map(function (template) {
          return {
            value: template.id,
            label: template.name
          };
        }), state.selectedTemplateId);
        state.selectedTemplateId = elements.templateSelect.value || '';

        clearList(elements.templateItems);
        var template = getSelectedTemplate();
        if (!template) {
          if (elements.templateNameInput) {
            elements.templateNameInput.value = '';
          }
          resetTemplateItemEditor();
          if (elements.templateItems) {
            elements.templateItems.appendChild(createMessageListItem('テンプレートはまだありません。', 'empty-item'));
          }
          return;
        }

        state.selectedTemplateId = template.id;
        if (elements.templateSelect) {
          elements.templateSelect.value = template.id;
        }
        if (elements.templateNameInput) {
          elements.templateNameInput.value = template.name;
        }
        normalizeArray(template.items).forEach(function (item) {
          elements.templateItems.appendChild(createMessageListItem(
            item.sortOrder + '. ' + item.title,
            'plain-item'
          ));
        });
        if (elements.templateItems.children.length === 0) {
          elements.templateItems.appendChild(createMessageListItem('項目はまだありません。', 'empty-item'));
        }

        renderTemplateItemEditor(template);
      }

      function requireStringValue(element, fieldName) {
        var value = String((element && element.value) || '').trim();
        if (!value) {
          throw new Error(fieldName + ' を入力してください');
        }
        return value;
      }

      function requirePositiveInteger(element, fieldName) {
        var value = Number((element && element.value) || '');
        if (!isFinite(value) || value < 1 || Math.floor(value) !== value) {
          throw new Error(fieldName + ' は 1 以上の整数で入力してください');
        }
        return value;
      }

      async function loadCurrentUser() {
        applyCurrentUser(await api.getMe(state.idToken));
      }

      async function linkAccount() {
        emitClientEvent('link.start', {
          hasEmployeeCode: !!String((elements.linkEmployeeCodeInput && elements.linkEmployeeCodeInput.value) || '').trim()
        });
        await api.linkAccount(state.idToken, {
          employeeCode: requireStringValue(elements.linkEmployeeCodeInput, '社員コード'),
          passcode: requireStringValue(elements.linkPasscodeInput, 'パスコード')
        });
        if (elements.linkEmployeeCodeInput) {
          elements.linkEmployeeCodeInput.value = '';
        }
        if (elements.linkPasscodeInput) {
          elements.linkPasscodeInput.value = '';
        }
        setLinkMode(false);
        await refresh();
        if (!state.me) {
          await loadCurrentUser();
          rerenderRoleDependentSections();
        }
        emitClientEvent('link.success', {
          userId: state.me && state.me.userId ? String(state.me.userId) : ''
        });
        setStatus('LINE 連携が完了しました');
      }

      function renderUnlinkedState() {
        state.me = null;
        clearOverview();
        clearList(elements.checklistItems);
        clearList(elements.incompleteItems);
        setLinkMode(true);
        emitClientEvent('unlinked.rendered', {});
        clearError();
        setStatus('LINE から再度開いてください。');
      }

      async function loadTemplates() {
        if (!canManageTemplates() || !api.listTemplates) {
          return;
        }
        var templateResponse = await api.listTemplates(state.idToken);
        state.templates = normalizeArray(templateResponse.templates);
        renderTemplates();
      }

      function buildIncompleteFromChecklist(checklist) {
        var uncheckedItems = normalizeArray(checklist && checklist.items).filter(function (item) {
          return item.status === 'unchecked';
        }).map(function (item) {
          return {
            id: item.id,
            title: item.title
          };
        });
        return {
          runId: checklist && checklist.runId ? checklist.runId : '',
          targetDate: checklist && checklist.targetDate ? checklist.targetDate : '',
          items: uncheckedItems
        };
      }

      async function refresh(options) {
        var refreshOptions = options || {};
        var includeAncillary = refreshOptions.includeAncillary !== false;
        clearError();

        var checklist = await api.getTodayChecklist(state.idToken);
        if (checklist && checklist.currentUser) {
          applyCurrentUser(checklist.currentUser);
        }
        renderOverview(checklist);
        renderChecklist(checklist);
        renderIncomplete(buildIncompleteFromChecklist(checklist));

        var templatesTask = null;
        if (includeAncillary) {
          if (canManageTemplates()) {
            templatesTask = loadTemplates();
          }
        }

        if (templatesTask) {
          await templatesTask;
        }
      }

      async function createTemplate() {
        var response = await api.createTemplate(state.idToken, {
          name: requireStringValue(elements.newTemplateNameInput, '新規テンプレート名')
        });
        if (elements.newTemplateNameInput) {
          elements.newTemplateNameInput.value = '';
        }
        await loadTemplates();
        if (response.template && response.template.id) {
          state.selectedTemplateId = response.template.id;
          renderTemplates();
        }
        setStatus('テンプレートを作成しました');
      }

      async function updateTemplate() {
        var template = getSelectedTemplate();
        if (!template) {
          throw new Error('更新対象のテンプレートがありません');
        }
        await api.updateTemplate(state.idToken, template.id, {
          name: requireStringValue(elements.templateNameInput, 'テンプレート名')
        });
        await loadTemplates();
        setStatus('テンプレート名を更新しました');
      }

      async function createTemplateItem() {
        var template = getSelectedTemplate();
        if (!template) {
          throw new Error('追加先のテンプレートがありません');
        }
        await api.createTemplateItem(state.idToken, template.id, {
          title: requireStringValue(elements.newItemTitleInput, '新規項目名'),
          description: String((elements.newItemDescriptionInput && elements.newItemDescriptionInput.value) || '').trim(),
          sortOrder: requirePositiveInteger(elements.newItemSortOrderInput, '並び順'),
          isRequired: !!(elements.newItemRequiredInput && elements.newItemRequiredInput.checked)
        });
        if (elements.newItemTitleInput) {
          elements.newItemTitleInput.value = '';
        }
        if (elements.newItemDescriptionInput) {
          elements.newItemDescriptionInput.value = '';
        }
        if (elements.newItemSortOrderInput) {
          elements.newItemSortOrderInput.value = '';
        }
        if (elements.newItemRequiredInput) {
          elements.newItemRequiredInput.checked = false;
        }
        await loadTemplates();
        setStatus('テンプレート項目を追加しました');
      }

      async function updateTemplateItem() {
        var template = getSelectedTemplate();
        var item = getSelectedTemplateItem();
        if (!template || !item) {
          throw new Error('更新対象の項目がありません');
        }
        await api.updateTemplateItem(state.idToken, template.id, item.id, {
          title: requireStringValue(elements.templateItemTitleInput, '項目名'),
          description: String((elements.templateItemDescriptionInput && elements.templateItemDescriptionInput.value) || '').trim(),
          sortOrder: requirePositiveInteger(elements.templateItemSortOrderInput, '並び順'),
          isRequired: !!(elements.templateItemRequiredInput && elements.templateItemRequiredInput.checked)
        });
        await loadTemplates();
        setStatus('テンプレート項目を更新しました');
      }

      async function deleteTemplateItem() {
        var template = getSelectedTemplate();
        var item = getSelectedTemplateItem();
        if (!template || !item) {
          throw new Error('削除対象の項目がありません');
        }
        await api.deleteTemplateItem(state.idToken, template.id, item.id);
        await loadTemplates();
        setStatus('テンプレート項目を削除しました');
      }

      async function notifyIncomplete() {
        if (!state.checklist || !state.checklist.runId) {
          throw new Error('対象のチェックリストがありません');
        }
        await api.notifyIncomplete(state.idToken, state.checklist.runId);
        setStatus('手動通知を送信しました');
      }

      async function runAction(action) {
        clearError();
        clearStatus();
        try {
          await action();
        } catch (error) {
          setError(error.message || '処理に失敗しました');
        }
      }

      function bindButton(element, handler) {
        if (!element || element.__bound) {
          return;
        }
        element.addEventListener('click', handler);
        element.__bound = true;
      }

      function bindChange(element, handler) {
        if (!element || element.__boundChange) {
          return;
        }
        element.addEventListener('change', handler);
        element.__boundChange = true;
      }

      function bindEvents() {
        bindButton(elements.linkAccountButton, function () {
          return runAction(function () {
            return linkAccount();
          });
        });
        bindButton(elements.refreshButton, function () {
          return runAction(function () {
            return refresh();
          });
        });
        bindButton(elements.notifyButton, function () {
          return runAction(function () {
            return notifyIncomplete();
          });
        });
        bindButton(elements.createTemplateButton, function () {
          return runAction(function () {
            return createTemplate();
          });
        });
        bindButton(elements.updateTemplateButton, function () {
          return runAction(function () {
            return updateTemplate();
          });
        });
        bindButton(elements.addTemplateItemButton, function () {
          return runAction(function () {
            return createTemplateItem();
          });
        });
        bindButton(elements.updateTemplateItemButton, function () {
          return runAction(function () {
            return updateTemplateItem();
          });
        });
        bindButton(elements.deleteTemplateItemButton, function () {
          return runAction(function () {
            return deleteTemplateItem();
          });
        });
        bindChange(elements.templateSelect, function (event) {
          state.selectedTemplateId = event.target.value;
          renderTemplates();
        });
        bindChange(elements.templateItemSelect, function (event) {
          state.selectedTemplateItemId = event.target.value;
          renderTemplateItemEditor(getSelectedTemplate());
        });
      }

      function withTimeout(promise, timeoutMs, message) {
        if (typeof global.setTimeout !== 'function' || typeof global.clearTimeout !== 'function') {
          return promise;
        }
        return new Promise(function (resolve, reject) {
          var settled = false;
          var timer = global.setTimeout(function () {
            if (settled) {
              return;
            }
            settled = true;
            reject(new Error(message));
          }, timeoutMs);

          promise.then(function (value) {
            if (settled) {
              return;
            }
            settled = true;
            global.clearTimeout(timer);
            resolve(value);
          }).catch(function (error) {
            if (settled) {
              return;
            }
            settled = true;
            global.clearTimeout(timer);
            reject(error);
          });
        });
      }

      async function init() {
        bindEvents();
        var initStartedAt = typeof Date === 'function' && typeof Date.now === 'function' ? Date.now() : 0;
        setText(elements.screenMode, 'チェック LIFF');
        setLinkMode(false);
        emitClientEvent('init.start', {});
        var topHref = '';
        try {
          if (global.top && global.top.location && global.top.location.href) {
            topHref = String(global.top.location.href);
          }
        } catch (error) {
          topHref = 'blocked';
        }
        emitClientEvent('init.context', {
          href: global.location && global.location.href ? String(global.location.href) : '',
          referrer: documentRef && documentRef.referrer ? String(documentRef.referrer) : '',
          topHref: topHref,
          isFramed: global.top !== global.self,
          userAgent: global.navigator && global.navigator.userAgent ? String(global.navigator.userAgent) : ''
        });
        try {
          clearError();
          clearStatus();
          var rawLiffId = global.OGAWAYA_LIFF_ID ? String(global.OGAWAYA_LIFF_ID) : '';
          var normalizedLiffId = auth.getNormalizedLiffIdForDebug ? auth.getNormalizedLiffIdForDebug() : '';
          emitClientEvent('init.auth.config', {
            liffId: rawLiffId,
            liffIdLength: rawLiffId.length,
            normalizedLiffId: normalizedLiffId,
            normalizedLiffIdLength: normalizedLiffId.length,
            isLiffIdValid: !!normalizedLiffId,
            allowAnonymousAccess: global.OGAWAYA_ALLOW_ANONYMOUS_ACCESS === true,
            hasLiffObject: !!global.liff,
            hasLiffInit: !!(global.liff && typeof global.liff.init === 'function'),
            href: global.location && global.location.href ? String(global.location.href) : ''
          });
          emitClientEvent('init.auth.start', {});
          var authResult = await withTimeout(
            auth.initialize(),
            10000,
            'LIFF 認証の初期化がタイムアウトしました。LINE から再度開いてください。'
          );
          state.idToken = authResult.idToken;
          emitClientEvent('init.auth.ok', {
            idTokenLength: state.idToken ? String(state.idToken).length : 0,
            isInClient: !!(authResult.context && authResult.context.isInClient),
            isLoggedIn: !!(authResult.context && authResult.context.isLoggedIn),
            isAnonymous: !!(authResult.context && authResult.context.isAnonymous),
            os: authResult.context && authResult.context.os ? String(authResult.context.os) : '',
            lineVersion: authResult.context && authResult.context.lineVersion ? String(authResult.context.lineVersion) : '',
            language: authResult.context && authResult.context.language ? String(authResult.context.language) : ''
          });
          await refresh({
            includeAncillary: false
          });
          if (!state.me) {
            await loadCurrentUser();
            rerenderRoleDependentSections();
          }
          loadAncillaryInBackground();
          emitClientEvent('init.ready', {
            role: state.me && state.me.role ? String(state.me.role) : '',
            elapsedMs: initStartedAt ? Date.now() - initStartedAt : 0
          });
        } catch (error) {
          emitClientEvent('init.error', {
            message: error && error.message ? String(error.message) : '',
            code: error && error.code ? String(error.code) : '',
            statusCode: error && error.statusCode ? Number(error.statusCode) : 0,
            elapsedMs: initStartedAt ? Date.now() - initStartedAt : 0
          });
          if (isUnlinkedUserError(error) || isUnauthorizedError(error)) {
            renderUnlinkedState();
            if (!isUnlinkedUserError(error)) {
              setError(error.message || '認証状態を確認できません');
            }
            return;
          }
          setError(error.message || 'LIFF の初期化に失敗しました');
        }
      }

      return {
        init: init,
        refresh: refresh,
        renderRole: renderRole,
        getState: function () {
          return state;
        }
      };
    }

    global.OgawayaLiff = {
      createApi: createApi,
      createAuth: createAuth,
      createController: createController
    };
  })(globalThis);
</script>
