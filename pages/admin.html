<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>管理者画面</title>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <header class="admin-header">
        <h1>管理者</h1>
        <p>タスクを管理して全体の進捗を確認します</p>
      </header>

      <section class="panel" id="admin-login-panel">
        <h2>ログイン</h2>
        <p>管理者IDとパスワードを入力してください。</p>
        <div class="form-grid">
          <label class="field">
            <span>管理者ID</span>
            <input id="admin-login-id" type="text" autocomplete="username" />
          </label>
          <label class="field">
            <span>パスワード</span>
            <input id="admin-login-password" type="password" autocomplete="current-password" />
          </label>
        </div>
        <div class="button-row">
          <button id="admin-login-button" type="button" class="primary">ログイン</button>
        </div>
      </section>

      <section class="error-box" id="error-message" data-visible="false"></section>
      <section class="status-box" id="status-message" data-visible="false"></section>

      <section class="panel" id="admin-main-panel" hidden>
        <div class="panel-head">
          <h2>タスクの作成</h2>
          <button id="admin-logout-button" type="button" class="ghost">ログアウト</button>
        </div>
        <div class="form-grid">
          <label class="field">
            <span>タスク名</span>
            <input id="task-title-input" type="text" placeholder="例: 店内清掃" />
          </label>
          <label class="field">
            <span>詳細 (任意)</span>
            <textarea id="task-description-input" rows="3" placeholder="例: 開店前にフロアと客席を清掃"></textarea>
          </label>
        </div>
        <div class="admin-action-grid">
          <button id="create-task-button" type="button" class="primary">タスクを作成</button>
          <button id="insert-task-button" type="button" class="ghost">タスクを挿入</button>
          <button id="create-template-button" type="button" class="ghost">テンプレートを作成</button>
          <button id="apply-template-button" type="button" class="ghost">テンプレートを挿入</button>
        </div>
        <div class="form-grid">
          <label class="field">
            <span>挿入するタスク</span>
            <select id="task-select"></select>
          </label>
          <label class="field">
            <span>新規テンプレート名</span>
            <input id="template-name-input" type="text" placeholder="例: 開店テンプレート" />
          </label>
          <label class="field">
            <span>挿入するテンプレート</span>
            <select id="template-select"></select>
          </label>
        </div>
        <div class="template-task-box">
          <p>テンプレートに含めるタスク</p>
          <ul id="template-task-list"></ul>
        </div>
      </section>

      <section class="panel" id="task-management-panel" hidden>
        <div class="panel-head">
          <h2>タスクの管理</h2>
          <label class="date-input-wrap">
            <input id="admin-date-input" type="date" />
          </label>
        </div>
        <ul id="admin-run-items" class="run-item-list"></ul>
      </section>

      <section class="panel" id="calendar-panel" hidden>
        <div class="panel-head">
          <h2>カレンダー</h2>
          <div class="calendar-nav">
            <button id="calendar-prev" type="button" class="ghost">‹</button>
            <span id="calendar-label"></span>
            <button id="calendar-next" type="button" class="ghost">›</button>
          </div>
        </div>
        <div class="calendar-grid-header">
          <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
        </div>
        <div id="calendar-grid" class="calendar-grid"></div>
      </section>
    </main>

    <script src="./admin.js?v=admin-ui-fixes-20260424"></script>
  </body>
</html>
