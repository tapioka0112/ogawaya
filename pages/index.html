<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>従業員画面</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
  </head>
  <body class="user-mode">
    <main class="todo-shell">
      <header class="todo-header">
        <div class="todo-brand">
          <span class="todo-brand-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
              <path
                d="M7.5 12.2l3 3 6-6.4"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <h1 class="todo-title">やることリスト</h1>
        </div>
        <button
          type="button"
          class="hamburger-btn"
          id="hamburger-button"
          aria-expanded="false"
          aria-controls="todo-menu"
          aria-label="メニューを開く"
        >
          <span class="hamburger-icon" aria-hidden="true">
            <svg class="hamburger-icon-lines" viewBox="0 0 24 24" width="24" height="24">
              <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <svg class="hamburger-icon-close" viewBox="0 0 24 24" width="24" height="24">
              <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
        </button>
      </header>

      <section id="todo-menu" class="menu-drawer" data-open="false" aria-hidden="true">
        <div class="menu-row">
          <span class="menu-label">店舗</span>
          <span class="menu-value" id="store-name">-</span>
        </div>
        <div class="menu-row">
          <span class="menu-label">対象日</span>
          <span class="menu-value" id="target-date">-</span>
        </div>
        <button class="action-button ghost-button menu-refresh" id="open-admin-button" type="button">管理者画面を開く</button>
        <button class="action-button ghost-button menu-refresh" id="refresh-button" type="button">最新状態に更新</button>
        <div class="error-box" id="error-message" data-visible="false" role="alert" aria-atomic="true"></div>
        <div class="status-box" id="status-message" data-visible="false" role="status" aria-atomic="true"></div>
      </section>

      <section class="progress-card" aria-label="今日の進捗">
        <div class="progress-ring-wrap">
          <svg class="progress-ring" viewBox="0 0 80 80" width="80" height="80" aria-hidden="true">
            <circle class="progress-ring-track" cx="40" cy="40" r="32" fill="none" stroke-width="8" />
            <circle
              class="progress-ring-progress"
              id="progress-ring-progress"
              cx="40"
              cy="40"
              r="32"
              fill="none"
              stroke-width="8"
              stroke-linecap="round"
              transform="rotate(-90 40 40)"
            />
          </svg>
          <span class="progress-ring-label" id="progress-ring-label">0%</span>
        </div>
        <div class="progress-info">
          <div class="progress-title">今日の進捗</div>
          <div class="progress-count">
            <strong id="progress-count-checked">0</strong>
            <span class="progress-count-sep">/</span>
            <span id="progress-count-total">0</span>
            <span class="progress-count-unit">件完了</span>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <span class="progress-bar-fill" id="progress-bar-fill"></span>
          </div>
        </div>
      </section>

      <section class="todo-list-wrap" id="main-content">
        <ul class="todo-list" id="checklist-items"></ul>
      </section>

      <section id="stats-content" hidden>
        <div class="stats-page-header">
          <h2>統計</h2>
          <p>あなたのタスク達成状況を確認しましょう</p>
        </div>
        <div class="stats-card">
          <div class="stats-card-heading">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21.21 15.89A10 10 0 1 1 8 2.83" /><path d="M22 12A10 10 0 0 0 12 2v10z" />
            </svg>
            <span>今月のタスクの達成状況</span>
          </div>
          <div class="stats-donut-row">
            <div class="stats-donut-wrap">
              <svg class="stats-donut" viewBox="0 0 80 80" width="80" height="80" aria-hidden="true">
                <circle class="stats-donut-track" cx="40" cy="40" r="32" fill="none" stroke-width="8" />
                <circle
                  class="stats-donut-progress"
                  id="stats-overall-progress"
                  cx="40"
                  cy="40"
                  r="32"
                  fill="none"
                  stroke-width="8"
                  stroke-linecap="round"
                  transform="rotate(-90 40 40)"
                  stroke-dasharray="201.06"
                  stroke-dashoffset="201.06"
                />
              </svg>
              <span class="stats-donut-label" id="stats-overall-pct">0%</span>
            </div>
            <div class="stats-donut-info" id="stats-overall-info"></div>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-card-heading">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" />
            </svg>
            <span>自分が完了させたタスク数</span>
          </div>
          <div class="stats-donut-row">
            <div class="stats-donut-wrap">
              <svg class="stats-donut" viewBox="0 0 80 80" width="80" height="80" aria-hidden="true">
                <circle class="stats-donut-track" cx="40" cy="40" r="32" fill="none" stroke-width="8" />
                <circle
                  class="stats-donut-progress"
                  id="stats-mine-progress"
                  cx="40"
                  cy="40"
                  r="32"
                  fill="none"
                  stroke-width="8"
                  stroke-linecap="round"
                  transform="rotate(-90 40 40)"
                  stroke-dasharray="201.06"
                  stroke-dashoffset="201.06"
                />
              </svg>
              <span class="stats-donut-label" id="stats-mine-pct">0%</span>
            </div>
            <div class="stats-donut-info" id="stats-mine-info"></div>
          </div>
        </div>
        <div class="stats-card">
          <div class="stats-cal-nav">
            <button class="stats-cal-nav-btn" id="stats-prev-month" type="button" aria-label="前月">&#8249;</button>
            <span id="stats-month-label"></span>
            <button class="stats-cal-nav-btn" id="stats-next-month" type="button" aria-label="翌月">&#8250;</button>
          </div>
          <div class="stats-cal-grid-header" id="stats-cal-grid-header"></div>
          <div class="stats-cal-grid" id="stats-calendar"></div>
        </div>
        <div class="stats-card stats-day-card" id="stats-day-detail-card" hidden>
          <div class="stats-card-heading">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M8 2v4" /><path d="M16 2v4" /><rect x="3" y="4" width="18" height="18" rx="2" />
              <path d="M3 10h18" />
            </svg>
            <span id="stats-day-detail-title">日別の詳細</span>
          </div>
          <p class="stats-day-summary" id="stats-day-detail-summary">カレンダーの日付を選択すると、当日の達成状況が表示されます。</p>
          <ul class="stats-day-list" id="stats-day-detail-items"></ul>
        </div>
      </section>
    </main>

    <nav class="tab-bar" aria-label="画面タブ">
      <button class="tab-btn tab-btn--active" id="tab-home" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
        ホーム
      </button>
      <button class="tab-btn" id="tab-stats" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="20" x2="18" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        統計
      </button>
    </nav>

    <div hidden>
      <span id="screen-mode">従業員 LIFF</span>
      <span id="progress-summary">-</span>
      <span id="incomplete-summary">未完了 0 件</span>
      <ul id="incomplete-items"></ul>
    </div>

    <div class="task-detail-modal" id="task-detail-panel" hidden role="dialog" aria-modal="true" aria-labelledby="task-detail-title">
      <button class="task-detail-backdrop" id="task-detail-backdrop" type="button" aria-label="タスク詳細を閉じる"></button>
      <article class="task-detail-card" tabindex="-1" aria-live="polite">
        <div class="task-detail-header">
          <div>
            <div class="task-detail-label">タスク詳細</div>
            <h2 class="task-detail-title" id="task-detail-title">タスク詳細</h2>
          </div>
          <button class="task-detail-close" id="task-detail-close" type="button" aria-label="タスク詳細を閉じる">×</button>
        </div>
        <p class="task-detail-description" id="task-detail-description"></p>
        <div class="task-detail-meta" id="task-detail-meta"></div>
      </article>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
